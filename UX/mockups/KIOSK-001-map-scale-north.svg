    <text x="836" y="281" fill="#6c7f92" font-size="9">via 156543.03 * cos(lat) / 2^zoom</text>
    <text x="836" y="294" fill="#6c7f92" font-size="9" font-style="italic">KIOSK-001:24, 42, 68 · pmtiles_map.rs:42-44</text>

    <text x="836" y="314" fill="#ff8232" font-size="10" font-weight="bold">3 · tile attribution</text>
