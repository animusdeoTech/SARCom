    <circle cx="445" cy="270" r="7" fill="#070b10" stroke="#ff8232" stroke-width="0.8"/>
    <text x="445" y="273" fill="#ff8232" font-size="9" text-anchor="middle">4</text>
    <!-- Layer-stack anchors -->
    <circle cx="270" cy="200" r="7" fill="#070b10" stroke="#ff8232" stroke-width="0.8"/>
    <text x="270" y="203" fill="#ff8232" font-size="9" text-anchor="middle">L1</text>
    <circle cx="380" cy="310" r="7" fill="#070b10" stroke="#ff8232" stroke-width="0.8"/>
    <text x="380" y="313" fill="#ff8232" font-size="9" text-anchor="middle">L2</text>
    <circle cx="160" cy="255" r="7" fill="#070b10" stroke="#ff8232" stroke-width="0.8"/>
    <text x="160" y="258" fill="#ff8232" font-size="9" text-anchor="middle">L3</text>

    <!-- Marginal text column at x=830..1080 -->
    <text x="836" y="80" fill="#c0ccd8" font-size="10" font-weight="bold">Map chrome budget (v1a)</text>
    <text x="836" y="94" fill="#6c7f92" font-size="9">scale bar + compass rose only</text>
    <text x="836" y="107" fill="#6c7f92" font-size="9">no zoom +/-, no fit-all, no home,</text>
    <text x="836" y="120" fill="#6c7f92" font-size="9">no clear-UI, no other floating buttons</text>
    <text x="836" y="133" fill="#6c7f92" font-size="9" font-style="italic">tickets/README.md:26 · KIOSK-001:16, 31</text>

    <text x="836" y="155" fill="#ff8232" font-size="10" font-weight="bold">1 · compass rose</text>
    <text x="836" y="169" fill="#6c7f92" font-size="9">top-left, ~80x80; N/E/S/W cardinals;</text>
    <text x="836" y="182" fill="#6c7f92" font-size="9">30° ticks; N-up locked (`N🔒`);</text>
    <text x="836" y="195" fill="#6c7f92" font-size="9">subtle HUD; non-interactive</text>
    <text x="836" y="208" fill="#6c7f92" font-size="9" font-style="italic">KIOSK-001:25, 27, 31 · mod.rs:261-268</text>

    <text x="836" y="228" fill="#ff8232" font-size="10" font-weight="bold">2 · scale bar</text>
    <text x="836" y="242" fill="#6c7f92" font-size="9">bottom-left, 80 px fixed, dual-tone,</text>
